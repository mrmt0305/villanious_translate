<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カード翻訳サイト</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />

<link rel="stylesheet" href="style.css" />

</head>

<body>

<div class="container">

<div class="title">
<div class="title-text">カード翻訳サイト</div>
<div class="title-actions">
<button id="apiKeyOpenBtn" class="key-icon-btn" type="button" aria-label="APIキー入力を開く">
<span class="material-symbols-outlined">key</span>
</button>
</div>
</div>

<div class="layout">

<!-- カード背景生成 -->

<div class="panel editor-side">
<div class="editor">
<h3>カード背景を生成</h3>
<div class="dict-color-rows">
<div class="dict-color-row">
<input id="bgColorInput" class="color-chip-input" type="color" value="#ffffff" aria-label="背景色を選択">
<span>背景色</span>
<span id="bgColorCode" class="color-code">(#FFFFFF)</span>
</div>
<div class="dict-color-row">
<input id="textColorInput" class="color-chip-input" type="color" value="#ebc655" aria-label="文字色を選択">
<span>文字色</span>
<span id="textColorCode" class="color-code">(#EBC655)</span>
</div>
</div>
<div class="bg-preview-wrap">
<img id="bgPreviewImage" src="image/flame.png" alt="生成されたカード背景プレビュー">
</div>
<button id="regenerateBgBtn" class="btn" type="button">再生成</button>
</div>
</div>

<!-- カードアップロード -->

<div class="panel main">

<div class="droparea" id="cardDrop">
<div id="cardDropPlaceholder">
<div class="icon"><span class="material-symbols-outlined">upload</span></div>
<p>画像をアップロード</p>
<p class="meta">対応形式: PNG / JPG / WEBP</p>
</div>
<div class="thumb-viewport">
<button id="prevBtn" class="nav-btn" aria-label="前へ">◀</button>
<div class="thumb-track-wrap">
<div id="thumbTrack" class="thumb-track"></div>
</div>
<button id="nextBtn" class="nav-btn" aria-label="次へ">▶</button>
</div>
</div>
<input id="replaceInput" type="file" accept="image/*" style="display:none;">

<button id="goBtn" class="btn primary" type="button">Go!</button>
<div id="resultPanel" class="result-panel hide">
<div class="result-header">
<h3>翻訳結果</h3>
<button id="printBtn" class="key-icon-btn" type="button" aria-label="印刷">
<span class="material-symbols-outlined">print</span>
</button>
</div>
<div class="result-viewport">
<button id="resultPrevBtn" class="nav-btn" aria-label="翻訳結果 前へ">◀</button>
<div class="result-track-wrap">
<div id="resultList" class="result-list"></div>
</div>
<button id="resultNextBtn" class="nav-btn" aria-label="翻訳結果 次へ">▶</button>
</div>
</div>

</div>

<!-- カスタム用語辞典 -->

<div class="panel side">

<div class="glossary-title-row">
<h3>カスタム用語辞典</h3>
<button id="resetGlossaryBtn" class="glossary-reset-btn" type="button" aria-label="カスタム用語辞典をリセット">
<span class="material-symbols-outlined">restart_alt</span>
</button>
</div>
<table class="dict-table">
<thead>
<tr>
<th class="color-col">色</th>
<th>英単語</th>
<th>日本語訳</th>
<th class="delete-col"></th>
</tr>
</thead>
<tbody id="termBody">
<tr>
<td class="color-col"><input class="color-chip-input" type="color" value="#ff0000" aria-label="文字色 1"></td>
<td><input type="text" value="Ally" aria-label="英単語 1"></td>
<td><input type="text" value="味方" aria-label="日本語訳 1"></td>
<td class="delete-col"><button class="term-delete-btn locked" type="button" aria-label="行を削除不可" disabled><span class="material-symbols-outlined">delete</span></button></td>
</tr>
<tr>
<td class="color-col"><input class="color-chip-input" type="color" value="#ff8c00" aria-label="文字色 2"></td>
<td><input type="text" value="Hero" aria-label="英単語 2"></td>
<td><input type="text" value="ヒーロー" aria-label="日本語訳 2"></td>
<td class="delete-col"><button class="term-delete-btn locked" type="button" aria-label="行を削除不可" disabled><span class="material-symbols-outlined">delete</span></button></td>
</tr>
<tr>
<td class="color-col"><input class="color-chip-input" type="color" value="#ff69b4" aria-label="文字色 3"></td>
<td><input type="text" value="Condition" aria-label="英単語 3"></td>
<td><input type="text" value="条件" aria-label="日本語訳 3"></td>
<td class="delete-col"><button class="term-delete-btn locked" type="button" aria-label="行を削除不可" disabled><span class="material-symbols-outlined">delete</span></button></td>
</tr>
<tr>
<td class="color-col"><input class="color-chip-input" type="color" value="#9acd32" aria-label="文字色 4"></td>
<td><input type="text" value="Effect" aria-label="英単語 4"></td>
<td><input type="text" value="効果" aria-label="日本語訳 4"></td>
<td class="delete-col"><button class="term-delete-btn locked" type="button" aria-label="行を削除不可" disabled><span class="material-symbols-outlined">delete</span></button></td>
</tr>
<tr>
<td class="color-col"><input class="color-chip-input" type="color" value="#66ccff" aria-label="文字色 5"></td>
<td><input type="text" value="Item" aria-label="英単語 5"></td>
<td><input type="text" value="アイテム" aria-label="日本語訳 5"></td>
<td class="delete-col"><button class="term-delete-btn locked" type="button" aria-label="行を削除不可" disabled><span class="material-symbols-outlined">delete</span></button></td>
</tr>
</tbody>
</table>
<button id="addTermBtn" class="btn dict-add" type="button">＋</button>
<div class="meta" id="termMeta">1 / 20</div>

</div>

</div>

</div>

<div id="apiKeyModal" class="modal hide">
<div class="modal-card">
<h3 style="margin:0;">OpenAI API Key</h3>
<div class="field" style="margin:0;">
<label for="openaiApiKey">APIキー</label>
<input id="openaiApiKey" type="password" placeholder="sk-...">
</div>
<div class="meta">APIキーはブラウザ内でのみ使用します</div>
<div class="row">
<button id="apiKeyCloseBtn" class="btn" type="button">閉じる</button>
</div>
</div>
</div>

<iframe id="printRenderFrame" class="print-render-frame" title="印刷専用"></iframe>

<script src="main.js"></script>

</body>
</html>
